name: Valideer Skills

on:
  pull_request:
      paths:
            - 'skills/**'
              push:
                  branches: [main]
                      paths:
                            - 'skills/**'

                            jobs:
                              valideer:
                                  runs-on: ubuntu-latest
                                      steps:
                                            - uses: actions/checkout@v4

                                                  - name: Controleer skill structuur
                                                          run: |
                                                                    echo "=== Skill Validatie ==="
                                                                              fouten=0

                                                                                        for skill_dir in skills/*/; do
                                                                                                    skill_naam=$(basename "$skill_dir")
                                                                                                                echo ""
                                                                                                                            echo "--- $skill_naam ---"
                                                                                                                            
                                                                                                                                        if [ ! -f "$skill_dir/SKILL.md" ]; then
                                                                                                                                                      echo "SKILL.md ontbreekt in $skill_naam"
                                                                                                                                                                    fouten=$((fouten + 1))
                                                                                                                                                                                else
                                                                                                                                                                                              echo "SKILL.md aanwezig"
                                                                                                                                                                                              
                                                                                                                                                                                                            if ! head -1 "$skill_dir/SKILL.md" | grep -q "^---"; then
                                                                                                                                                                                                                            echo "SKILL.md mist YAML frontmatter in $skill_naam"
                                                                                                                                                                                                                                            fouten=$((fouten + 1))
                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                          echo "Frontmatter aanwezig"
                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                      regels=$(wc -l < "$skill_dir/SKILL.md")
                                                                                                                                                                                                                                                                                                                    if [ "$regels" -lt 10 ]; then
                                                                                                                                                                                                                                                                                                                                    echo "SKILL.md is erg kort ($regels regels) in $skill_naam"
                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                  echo "SKILL.md heeft $regels regels"
                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                                                      done
                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                          echo "=== Resultaat ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "Skills gecontroleerd: $(ls -d skills/*/ 2>/dev/null | wc -l)"
                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                              if [ $fouten -gt 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "$fouten fout(en) gevonden"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Alle checks geslaagd"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      fi
